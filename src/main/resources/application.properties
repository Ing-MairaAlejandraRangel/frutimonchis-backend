# ===============================================
# =       CONFIGURACIÓN GENERAL DEL PROYECTO     =
# ===============================================
spring.application.name=frutimonchis-backend
server.port=8090

# ===============================================
# =       CONEXIÓN A LA BASE DE DATOS POSTGRES    =
# ===============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/dbfrutimonchis
spring.datasource.username=user_apidos
spring.datasource.password=1234

# ===============================================

# =       CONFIGURACIÓN DE JPA Y HIBERNATE       =
# ===============================================
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================================
# =       CONFIGURACIÓN DE SERIALIZACIÓN JSON    =
# ===============================================
spring.jackson.serialization.fail-on-empty-beans=false

# ===============================================
# =       LOGGING Y NIVELES DE HIBERNATE         =
# ===============================================
logging.level.org.hibernate=error
# Para depurar queries SQL, descomenta estas líneas:
# logging.level.org.hibernate.SQL=debug
# logging.level.org.hibernate.type.descriptor.sql=trace

# ===============================================
# =       CONFIGURACIÓN DE SWAGGER / OPENAPI     =
# ===============================================
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs
